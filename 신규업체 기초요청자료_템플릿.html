<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>노무법인 두웰 - 메일 템플릿 매니저</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --bg-color: #f8fafc;
            --border-color: #e2e8f0;
            --text-color: #334155;
        }
        * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { margin: 0; padding: 20px; background: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; }
        
        .container { display: flex; width: 100%; max-width: 1400px; gap: 24px; height: calc(100vh - 40px); }
        .panel { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .panel-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 16px; background: #fafafa; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .panel-body { padding: 24px; overflow-y: auto; flex: 1; }

        /* 왼쪽 컨트롤러 스타일 */
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .input-text { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        
        .section-box { border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; margin-bottom: 20px; background: #fdfdfd; }
        .section-title { font-weight: 600; font-size: 15px; margin-bottom: 12px; color: var(--primary-color); }
        
        /* 정렬 가능한 리스트 스타일 */
        .sortable-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .sort-item { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 6px; cursor: grab; }
        .sort-item:active { cursor: grabbing; }
        .drag-handle { color: #94a3b8; font-size: 16px; margin-right: 4px; user-select: none; }
        .sort-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary-color); cursor: pointer; }
        .sort-item .item-input { flex: 1; border: none; font-size: 14px; padding: 2px 4px; color: #334155; }
        .sort-item .item-input:focus { outline: 1px solid #cbd5e1; background: #f8fafc; border-radius: 4px; }
        .del-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 0 4px; }
        
        .add-input-box { display: flex; gap: 8px; margin-top: 8px; }
        .add-input { flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; }
        .add-submit-btn { background: #f1f5f9; border: 1px solid var(--border-color); color: #334155; padding: 0 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .add-submit-btn:hover { background: #e2e8f0; }

        /* 오른쪽 프리뷰 스타일 */
        .mail-wrapper { border: 1px solid var(--border-color); padding: 30px; background: white; min-height: 100%; font-size: 14px; line-height: 1.6; color: #333; }
        .copy-btn { background: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="panel-header">메일 옵션 및 순서 편집</div>
        <div class="panel-body">
            
            <div class="input-group">
                <label>사업장명</label>
                <input type="text" id="companyName" class="input-text" value="㈜아트인" oninput="renderMail()">
            </div>
            <div class="input-group">
                <label>담당자 연락처 (Tel / 직통번호)</label>
                <input type="text" id="contactInfo" class="input-text" value="000-0000-0000" oninput="renderMail()">
            </div>

            <div class="section-box">
                <div class="section-title">1. 첨부 양식에 내용 기재</div>
                <div id="formList" class="sortable-list">
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="대행약정서 : 자문료 지급일자 및 위임인 서명" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="기초정보 요청서식 : 사업장 정보 및 근로자 정보 등 기재" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="자동이체신청동의서 : 자동이체 원하실 경우 작성" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="EDI 업무대행신청서 : 아래의 서명란에 직인 날인" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                </div>
                <div class="add-input-box">
                    <input type="text" id="newFormText" class="add-input" placeholder="새로운 첨부양식 항목 추가...">
                    <button class="add-submit-btn" onclick="addNewItem('formList', 'newFormText')">추가</button>
                </div>
            </div>

            <div class="section-box">
                <div class="section-title">2. 사내 보유 자료 제출</div>
                <div id="docList" class="sortable-list">
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="기존자료 (취업규칙, 전직원 근로계약서, 3개월 임금대장)" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="사업자등록증 사본" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                    <div class="sort-item">
                        <span class="drag-handle">☰</span>
                        <input type="checkbox" checked onchange="renderMail()">
                        <input type="text" class="item-input" value="통장 사본" oninput="renderMail()">
                        <button class="del-btn" onclick="deleteItem(this)">×</button>
                    </div>
                </div>
                <div class="add-input-box">
                    <input type="text" id="newDocText" class="add-input" placeholder="새로운 사내보유자료 항목 추가...">
                    <button class="add-submit-btn" onclick="addNewItem('docList', 'newDocText')">추가</button>
                </div>
            </div>

        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span>메일 미리보기</span>
            <button class="copy-btn" onclick="copyMail()">전체 복사하기</button>
        </div>
        <div class="panel-body" style="background: #f1f5f9;">
            <div id="mailPreview" class="mail-wrapper">
                </div>
        </div>
    </div>
</div>

<script>
    const circleNums = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩', '⑪', '⑫', '⑬', '⑭', '⑮', '⑯', '⑰', '⑱', '⑲', '⑳'];

    // 드래그앤드롭 라이브러리 활성화
    new Sortable(document.getElementById('formList'), { handle: '.drag-handle', animation: 150, onEnd: renderMail });
    new Sortable(document.getElementById('docList'), { handle: '.drag-handle', animation: 150, onEnd: renderMail });

    // 항목 추가 기능
    function addNewItem(listId, inputId) {
        const inputElement = document.getElementById(inputId);
        const text = inputElement.value.trim();
        if (!text) return;

        const container = document.getElementById(listId);
        const div = document.createElement('div');
        div.className = 'sort-item';
        div.innerHTML = `
            <span class="drag-handle">☰</span>
            <input type="checkbox" checked onchange="renderMail()">
            <input type="text" class="item-input" value="${text}" oninput="renderMail()">
            <button class="del-btn" onclick="deleteItem(this)">×</button>
        `;
        
        container.appendChild(div);
        inputElement.value = ''; 
        renderMail();
    }

    // 항목 삭제 기능
    function deleteItem(btn) {
        btn.parentElement.remove();
        renderMail();
    }

    // 실시간 메일 HTML 렌더링 함수
    function renderMail() {
        const company = document.getElementById('companyName').value || '[사업장명]';
        const contact = document.getElementById('contactInfo').value || '[연락처]';
        
        let currentNumIdx = 0;

        // 1. 첨부 양식 리스트 조립
        const formItems = document.querySelectorAll('#formList .sort-item');
        let formHTML = '';
        formItems.forEach(item => {
            const isChecked = item.querySelector('input[type="checkbox"]').checked;
            const val = item.querySelector('.item-input').value.trim();
            if (isChecked && val) {
                formHTML += `<div style="margin-bottom: 4px; padding-left: 10px;">${circleNums[currentNumIdx++]} ${val}</div>`;
            }
        });

        // 2. 사내 보유 자료 리스트 조립
        const docItems = document.querySelectorAll('#docList .sort-item');
        let docHTML = '';
        docItems.forEach(item => {
            const isChecked = item.querySelector('input[type="checkbox"]').checked;
            const val = item.querySelector('.item-input').value.trim();
            if (isChecked && val) {
                docHTML += `<div style="margin-bottom: 4px; padding-left: 10px;">${circleNums[currentNumIdx++]} ${val}</div>`;
            }
        });

        // 메일 본문 조립
        const emailTemplate = `
            <div style="max-width: 600px; font-family: '맑은 고딕', Malgun Gothic, sans-serif; font-size: 14px; line-height: 1.6; color: #333333;">
                <p style="margin: 0 0 16px 0;">안녕하십니까,<br>노무법인 두웰입니다.</p>
                
                <p style="margin: 0 0 24px 0;"><span style="color: #1e3a8a; font-weight: bold;">${company}</span> 급여 아웃소싱 진행에 앞서 필요한 정보를 요청 드리오니,<br>
                첨부파일 내 양식 작성과 함께 제출 구비서류를 준비하여 전달해 주시기 바랍니다.</p>
                
                <div style="margin-bottom: 20px;">
                    <div style="font-weight: bold; color: #1e3a8a; margin-bottom: 8px; font-size: 15px;">1. 첨부 양식에 내용 기재</div>
                    ${formHTML ? formHTML : '<div style="color:#999; font-style:italic; padding-left:10px;">선택되거나 입력된 양식이 없습니다.</div>'}
                </div>
                
                <div style="margin-bottom: 24px;">
                    <div style="font-weight: bold; color: #1e3a8a; margin-bottom: 8px; font-size: 15px;">2. 사내 보유 자료 제출</div>
                    ${docHTML ? docHTML : '<div style="color:#999; font-style:italic; padding-left:10px;">선택되거나 입력된 제출 자료가 없습니다.</div>'}
                </div>
                
                <div style="background-color: #f8fafc; border-left: 4px solid #1e3a8a; padding: 12px 16px; margin-bottom: 24px; border-radius: 0 6px 6px 0;">
                    작성 중 문의사항이 있으신 경우 아래 번호로 연락 부탁드립니다.<br>
                    <span style="font-weight: bold; color: #1e3a8a;">tel : ${contact}</span>
                </div>
                
                <p style="margin: 0;">감사합니다.</p>
            </div>
        `;

        document.getElementById('mailPreview').innerHTML = emailTemplate;
    }

    // 클립보드 복사 함수
    function copyMail() {
        const container = document.getElementById('mailPreview');
        const range = document.createRange();
        range.selectNode(container);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            alert('메일 내용이 깔끔하게 복사되었습니다!\n보내실 메일 본문에 [Ctrl + V]로 붙여넣으세요.');
        } catch (err) {
            alert('복사에 실패했습니다. 프리뷰 영역을 직접 드래그해서 복사해 주세요.');
        }
        window.getSelection().removeAllRanges();
    }

    // 최초 렌더링 실행
    renderMail();
</script>

</body>
</html>
